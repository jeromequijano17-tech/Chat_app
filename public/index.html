<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Real-Time Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        #chat-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        #chat-header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }
        #messages {
            list-style-type: none;
            padding: 20px;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
            border-bottom: 1px solid #ddd;
        }
        #messages li {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f1f0f0;
            max-width: 80%;
        }
        #messages li strong {
            color: #007bff;
            display: block;
            margin-bottom: 3px;
        }
        #chat-form {
            display: flex;
            padding: 10px;
            background-color: #fafafa;
        }
        #username-input {
            width: 25%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
        }
        #message-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
        }
        #send-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        #send-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Online Chat Room</div>
    <ul id="messages"></ul>
    <form id="chat-form">
        <input type="text" id="username-input" placeholder="Name" required autocomplete="off">
        <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
    </form>
</div>

<!-- Socket.io client library provided automatically by the socket.io server -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    const form = document.getElementById('chat-form');
    const usernameInput = document.getElementById('username-input');
    const messageInput = document.getElementById('message-input');
    const messagesList = document.getElementById('messages');

    // Helper function to append a message to the UI
    function appendMessage(data) {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${escapeHTML(data.username)}:</strong> ${escapeHTML(data.message)}`;
        messagesList.appendChild(li);
        messagesList.scrollTop = messagesList.scrollHeight; // Scroll to bottom
    }

    // Basic XSS prevention
    function escapeHTML(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Listen for past message history from the server upon connection
    socket.on('load history', (history) => {
        messagesList.innerHTML = ''; // Clear temporary list
        history.forEach(appendMessage);
    });

    // Listen for incoming messages in real-time
    socket.on('chat message', (data) => {
        appendMessage(data);
    });

    // Handle form submission
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const message = messageInput.value.trim();

        if (username && message) {
            // Send the message details to the server
            socket.emit('chat message', { username, message });
            
            // Clear message input but keep the username
            messageInput.value = '';
            messageInput.focus();
        }
    });
</script>

</body>
</html>
